<!DOCTYPE html>
<html>
<head>
    <title>Hasil Analisis Tanah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1b5e20, #43a047);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .nilai {
            font-size: 40px;
            font-weight: 600;
            color: #1b5e20;
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-weight: 500;
            margin-top: 10px;
        }

        .baik { background: #2e7d32; }
        .sedang { background: #f9a825; }
        .buruk { background: #c62828; }

        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            padding: 10px 20px;
            background: #2e7d32;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #1b5e20;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Hasil Analisis Kualitas Tanah</h2>

    <div class="nilai">{{ hasil }}</div>

    {% if label == "Baik" %}
        <div class="badge baik">{{ label }}</div>
    {% elif label == "Sedang" %}
        <div class="badge sedang">{{ label }}</div>
    {% else %}
        <div class="badge buruk">{{ label }}</div>
    {% endif %}
    <hr>
<h3>Visualisasi Radar</h3>
<img src="data:image/png;base64,{{ graphic }}" style="width:100%; border-radius:10px;">
    <br>
    <a href="/">Analisis Ulang</a>
</div>

</body>
</html>
