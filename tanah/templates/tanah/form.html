<!DOCTYPE html>
<html>
<head>
    <title>Sistem Penilaian Kualitas Tanah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #2e7d32, #66bb6a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 40px;
        width: 450px;              /* sedikit diperbesar */
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #2e7d32;
    }

    form {
        width: 100%;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #2e7d32;
        outline: none;
        box-shadow: 0 0 5px rgba(46,125,50,0.5);
    }

    button {
        width: 100%;
        padding: 14px;
        background: #2e7d32;
        border: none;
        color: white;
        font-weight: 600;
        font-size: 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    button:hover {
        background: #1b5e20;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="card">
    <h2>Input Data Tanah</h2>

    <form method="post">
        {% csrf_token %}

        <input type="number" step="any" name="pH" placeholder="pH Tanah" required>
        <input type="number" step="any" name="KTK" placeholder="KTK" required>
        <input type="number" step="any" name="C_Organik" placeholder="C-Organik (%)" required>
        <input type="number" step="any" name="N_Total" placeholder="N-Total (%)" required>
        <input type="number" step="any" name="P_Total" placeholder="P-Total (ppm)" required>
        <input type="number" step="any" name="K_Total" placeholder="K-Total (ppm)" required>

        <button type="submit">Proses Analisis</button>
    </form>
</div>

</body>
</html>
